name: Update Navigation Data
description: Updates Navigation Data and creates a Pull Request.

on:
  workflow_dispatch:

jobs:
  update-navigation-data:

    runs-on: ubuntu-latest

    # Install deps
    steps:
      - name: 📦 Checkout
        uses: actions/checkout@v6

      - name: 🎚️ Enable Corepack
        run: corepack enable

      - name: 🏗️ Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: latest

      - name: 📦 Install deps
        run: yarn install --immutable

      # Create new branch
